<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Film frame 1 (back) -->
  <rect x="3" y="5" width="18" height="14" rx="2.5" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Sprocket holes on frame 1 -->
  <rect x="5.5" y="7.5" width="2.5" height="2" rx="0.5" fill="#f59e0b"/>
  <rect x="5.5" y="13.5" width="2.5" height="2" rx="0.5" fill="#f59e0b"/>
  <rect x="16" y="7.5" width="2.5" height="2" rx="0.5" fill="#f59e0b"/>
  <rect x="16" y="13.5" width="2.5" height="2" rx="0.5" fill="#f59e0b"/>
  <!-- Film frame 2 (shifted — in front) -->
  <rect x="11" y="13" width="18" height="14" rx="2.5" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <!-- Sprocket holes on frame 2 -->
  <rect x="13.5" y="15.5" width="2.5" height="2" rx="0.5" fill="#fbbf24"/>
  <rect x="13.5" y="21.5" width="2.5" height="2" rx="0.5" fill="#fbbf24"/>
  <rect x="24" y="15.5" width="2.5" height="2" rx="0.5" fill="#fbbf24"/>
  <rect x="24" y="21.5" width="2.5" height="2" rx="0.5" fill="#fbbf24"/>
</svg>
